<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Attente</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="container">
    <h2>⚔️ RECHERCHE D'ADVERSAIRE ⚔️</h2>
    <div class="loader"></div>
    <p id="status">En attente d'un adversaire...</p>
    <p id="timer">0 secondes</p>
    <button onclick="annuler()">❌ ANNULER</button>
</div>
<button class="btn-son">🔊</button>
<script src="js/son.js"></script>
<script>
const code = localStorage.getItem('duelCode');
let secondes = 0;
let interval = setInterval(() => { secondes++; document.getElementById('timer').innerText = secondes + ' secondes'; }, 1000);
let verif = setInterval(async () => {
    let res = await fetch('/api/duel/etat/' + code);
    let data = await res.json();
    if (data.statut === 'pret') {
        clearInterval(verif); clearInterval(interval);
        window.location.href = 'jeu-duel.html';
    }
}, 2000);
async function annuler() {
    clearInterval(verif); clearInterval(interval);
    await fetch('/api/duel/abandonner', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({code}) });
    window.location.href = 'duel.html';
}
</script>
<style>
.container{background:#111;border:2px solid #f30;border-radius:20px;padding:50px;text-align:center}
.loader{width:80px;height:80px;border:4px solid #f30;border-top-color:#f80;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
button{margin-top:20px;padding:10px 20px;background:#c00;color:#fff;border:none;border-radius:10px;cursor:pointer}
h2{color:#f60}p{color:#f80}
</style>
</body>
</html>
